name: Build installers

# Builds two editions per OS:
#   Lyra          — lean, no PyTorch (25 languages + system audio)
#   Lyra Extended — bundles PyTorch/SeamlessM4T (adds Armenian + 100 languages)
# Both are fully self-contained: an end user needs no Python, uv, or pip installed.
# Signing/notarization activate only if the corresponding secrets are set.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    name: macOS ${{ matrix.edition }} .dmg
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        edition: [base, extended]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python pin 3.12
      - name: Build .app + .dmg
        env:
          LYRA_EDITION: ${{ matrix.edition }}
          VERSION: ${{ github.ref_name }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER: ${{ secrets.AC_API_ISSUER }}
          AC_API_KEY_PATH: ${{ secrets.AC_API_KEY_PATH }}
        run: bash packaging/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lyra-${{ matrix.edition }}-macos
          path: dist/*.dmg

  windows:
    name: Windows ${{ matrix.edition }} .exe
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [base, extended]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python pin 3.12
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build onedir + installer
        env:
          LYRA_EDITION: ${{ matrix.edition }}
          VERSION: ${{ github.ref_name }}
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: pwsh packaging/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: lyra-${{ matrix.edition }}-windows
          path: dist/installer/*.exe
