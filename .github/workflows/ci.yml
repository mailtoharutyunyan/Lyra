name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python 3.12
        run: uv python pin 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests (excluding integration; no ML models in CI)
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -m "not integration" -q
